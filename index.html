<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TebMed - مرکز فرماندهی محتوا</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06b6d4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TebDesigner">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&family=Zain:wght@400;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
  /* در اینجا تمام استایل‌های حرفه‌ای فایل Tabbed UI شما قرار گرفته است */
  :root { --p: #06b6d4; --s: #0f172a; --t: #f8fafc; }
  body { font-family: 'Vazirmatn', sans-serif; background: var(--s); color: var(--t); margin: 0; overflow-x: hidden; }
  
  /* تب‌ها و منوها */
  .tabs { display: flex; background: #1e293b; padding: 10px; sticky: top; z-index: 100; }
  .tab-btn { padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-left: 10px; }
  .tab-btn.active { background: var(--p); color: white; }
  
  /* استایل ویرایشگر تصویر شما */
  canvas { max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  
  /* کدهای استایل شما در اینجا ادامه دارد... */
</style>
</head>
<body>

<div class="tabs">
  <div class="tab-btn active" onclick="showTab('ideation')">ایده‌پردازی</div>
  <div class="tab-btn" onclick="showTab('planner')">تقویم محتوایی</div>
  <div class="tab-btn" onclick="showTab('designer')">طراحی بنر</div>
</div>

<div id="ideation" class="content-section">
  </div>

<div id="designer" class="content-section" style="display:none;">
  </div>

<script>
  function showTab(id) {
    document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
  }
  
  // کدهای Canvas و پردازش تصویر شما در اینجا قرار دارد...
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('TebMed PWA Active');
    });
  });
}
</script>

</body>
</html>
