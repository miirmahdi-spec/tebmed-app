<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TebMed Command Center v2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00B7D1">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { background: #0F172A; color: #E2E8F0; font-family: 'Vazirmatn', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .accent-border { border-right: 4px solid #00B7D1; }
        canvas { border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; height: auto; }
        .control-panel { max-height: 85vh; overflow-y: auto; padding-right: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6 control-panel">
            <div class="glass p-5 rounded-2xl">
                <h2 class="text-[#00B7D1] font-bold mb-4 flex items-center gap-2">
                    <span>🌐</span> مدیریت ترجمه و متن
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400">متن اصلی (فارسی)</label>
                        <textarea id="masterText" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm mt-1" rows="2" oninput="updateCanvas()">مراقبت پزشکی در سطح جهانی</textarea>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="autoTranslate()" class="text-xs bg-[#00B7D1] text-slate-900 font-bold px-3 py-2 rounded-md w-full">ترجمه هوشمند (بنگالی/عربی)</button>
                    </div>
                </div>
            </div>

            <div class="glass p-5 rounded-2xl">
                <h2 class="text-[#00B7D1] font-bold mb-4">🎨 ابزارهای ادیت حرفه‌ای</h2>
                <div class="grid grid-cols-2 gap-3 text-xs">
                    <button onclick="applyFilter('grayscale(100%)')" class="bg-slate-800 p-2 rounded-md border border-slate-700">سیاه و سفید</button>
                    <button onclick="applyFilter('sepia(50%)')" class="bg-slate-800 p-2 rounded-md border border-slate-700">تم گرم</button>
                    <button onclick="applyFilter('brightness(120%)')" class="bg-slate-800 p-2 rounded-md border border-slate-700">افزایش نور</button>
                    <button onclick="applyFilter('none')" class="bg-red-900/30 p-2 rounded-md border border-red-800">حذف فیلتر</button>
                </div>
                <div class="mt-4">
                    <input type="file" id="imageUpload" class="hidden" onchange="handleImage(event)">
                    <button onclick="document.getElementById('imageUpload').click()" class="w-full border-2 border-dashed border-slate-600 p-4 rounded-xl hover:border-[#00B7D1] transition-all text-slate-400 text-sm">
                        + آپلود تصویر پس‌زمینه
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="glass p-6 rounded-3xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold">پیش‌نمایش زنده (Live Preview)</h3>
                    <button onclick="downloadImage()" class="bg-white text-slate-900 px-6 py-2 rounded-full font-bold text-sm shadow-xl hover:scale-105 transition-transform">خروجی نهایی</button>
                </div>
                <div class="flex justify-center bg-black/40 rounded-2xl p-4">
                    <canvas id="mainCanvas" width="1080" height="1350" class="max-w-[400px]"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let activeImage = null;
        let currentFilter = 'none';

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    activeImage = img;
                    updateCanvas();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function applyFilter(filter) {
            currentFilter = filter;
            updateCanvas();
        }

        function updateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم تصویر با فیلتر
            if (activeImage) {
                ctx.filter = currentFilter;
                ctx.drawImage(activeImage, 0, 0, canvas.width, canvas.height);
                ctx.filter = 'none';
            } else {
                ctx.fillStyle = '#1E293B';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // لایه تیره برای خوانایی متن
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // متن فارسی
            const text = document.getElementById('masterText').value;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 60px Vazirmatn';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            
            // لوگو فرضی TebMed
            ctx.fillStyle = '#00B7D1';
            ctx.font = '30px Vazirmatn';
            ctx.fillText('TebMedTourism', canvas.width/2, canvas.height - 80);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'tebmed-post.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Service Worker برای PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        window.onload = updateCanvas;
    </script>
</body>
</html>
