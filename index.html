<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TebMed Social Studio</title>  <!-- Tailwind -->  <script src="https://cdn.tailwindcss.com"></script>  <!-- Fabric.js -->  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>  <!-- Fonts -->  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&family=Vazirmatn:wght@400;500;700&family=Lalezar&family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0b1120;
      color: white;
      font-family: Vazirmatn, sans-serif;
      overflow: hidden;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-btn {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .sidebar-btn:hover {
      background: rgba(0,183,209,0.18);
      border-color: rgba(74,246,210,0.3);
    }

    .panel-input,
    .panel-select,
    .panel-textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.25);
      color: white;
      padding: 10px 12px;
      outline: none;
      font-size: 13px;
    }

    .panel-input:focus,
    .panel-select:focus,
    .panel-textarea:focus {
      border-color: #00b7d1;
    }

    .toolbar-btn {
      border-radius: 12px;
      background: linear-gradient(135deg,#00b7d1,#4af6d2);
      color: #0b1120;
      font-weight: 700;
      border: none;
      padding: 10px 14px;
      cursor: pointer;
    }

    #canvas-wrapper {
      background:
      radial-gradient(circle at top left, rgba(0,183,209,0.15), transparent 30%),
      radial-gradient(circle at bottom right, rgba(74,246,210,0.12), transparent 30%),
      #111827;
    }

    .property-title {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .tab-btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      font-size: 12px;
    }

    .tab-btn.active {
      background: rgba(0,183,209,0.2);
      border-color: rgba(74,246,210,0.4);
      color: #4af6d2;
    }

    @media(max-width:1024px){
      .desktop-only {
        display:none;
      }

      #mobile-bottom-bar {
        display:flex;
      }
    }
  </style></head>
<body><div class="h-screen flex flex-col">  <!-- TOPBAR -->  <header class="glass h-16 flex items-center justify-between px-5 border-b border-white/5"><div class="flex items-center gap-3">
  <div class="w-10 h-10 rounded-xl bg-cyan-400 flex items-center justify-center text-black font-bold">
    T
  </div>

  <div>
    <div class="font-bold text-lg">TebMed Social Studio</div>
    <div class="text-[10px] text-slate-400">Medical Tourism Cover Builder</div>
  </div>
</div>

<div class="flex items-center gap-2">
  <button class="toolbar-btn" onclick="exportPNG()">PNG خروجی</button>
  <button class="toolbar-btn" onclick="exportJPG()">JPG خروجی</button>
</div>

  </header>  <!-- MAIN -->  <div class="flex-1 flex overflow-hidden"><!-- LEFT SIDEBAR -->
<aside class="glass w-20 desktop-only border-l border-white/5 flex flex-col items-center gap-3 py-4">

  <div class="sidebar-btn">📝</div>
  <div class="sidebar-btn">🖼️</div>
  <div class="sidebar-btn">⬜</div>
  <div class="sidebar-btn">🎨</div>
  <div class="sidebar-btn">🌍</div>
  <div class="sidebar-btn">📦</div>
  <div class="sidebar-btn">⚙️</div>

</aside>

<!-- CANVAS -->
<main class="flex-1 flex items-center justify-center overflow-hidden p-4 md:p-6" id="canvas-wrapper">

  <div id="canvas-container" class="rounded-[30px] overflow-hidden shadow-2xl border border-white/10 bg-black flex items-center justify-center">
    <canvas id="editorCanvas"></canvas>
  </div>

</main>

<!-- RIGHT PANEL -->
<aside class="glass w-[360px] desktop-only border-r border-white/5 overflow-y-auto p-5">

  <!-- TABS -->
  <div class="flex gap-2 mb-5">
    <div class="tab-btn active">متن</div>
    <div class="tab-btn">ترجمه</div>
    <div class="tab-btn">فیلتر</div>
    <div class="tab-btn">خروجی</div>
  </div>

  <!-- TEXT -->
  <div class="mb-5">
    <div class="property-title">تیتر اصلی</div>
    <textarea id="headline" class="panel-textarea" rows="3">مراقبت پزشکی در سطح جهانی</textarea>
  </div>

  <!-- LANG -->
  <div class="grid grid-cols-2 gap-3 mb-5">

    <div>
      <div class="property-title">زبان</div>
      <select id="language" class="panel-select">
        <option value="fa">فارسی</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
        <option value="bn">বাংলা</option>
      </select>
    </div>

    <div>
      <div class="property-title">فونت</div>
      <select id="fontFamily" class="panel-select">
        <option value="Vazirmatn">Vazirmatn</option>
        <option value="Lalezar">Lalezar</option>
        <option value="Inter">Inter</option>
        <option value="Montserrat">Montserrat</option>
        <option value="Playfair Display">Playfair</option>
        <option value="Cairo">Cairo</option>
        <option value="Tajawal">Tajawal</option>
        <option value="Hind Siliguri">Hind Siliguri</option>
      </select>
    </div>

  </div>

  <!-- FONT SIZE -->
  <div class="mb-5">
    <div class="property-title">اندازه فونت</div>
    <input type="range" id="fontSize" min="20" max="120" value="64" class="w-full">
  </div>

  <!-- COLOR -->
  <div class="mb-5">
    <div class="property-title">رنگ متن</div>
    <input type="color" id="textColor" value="#ffffff" class="w-full h-12 rounded-xl overflow-hidden border-none bg-transparent">
  </div>

  <!-- BG IMAGE -->
  <div class="mb-5">
    <div class="property-title">تصویر پس‌زمینه</div>
    <input type="file" id="bgUpload" class="panel-input" accept="image/*">
  </div>

  <!-- TRANSLATION -->
  <div class="space-y-4">

    <div>
      <div class="property-title">English</div>
      <textarea class="panel-textarea" id="transEn">World-Class Medical Care</textarea>
    </div>

    <div>
      <div class="property-title">العربية</div>
      <textarea class="panel-textarea" id="transAr">رعاية طبية عالمية المستوى</textarea>
    </div>

    <div>
      <div class="property-title">বাংলা</div>
      <textarea class="panel-textarea" id="transBn">বিশ্বমানের চিকিৎসা সেবা</textarea>
    </div>

  </div>

</aside>

  </div></div><!-- MOBILE BOTTOM BAR --><div id="mobile-bottom-bar" class="hidden fixed bottom-0 left-0 right-0 h-16 glass border-t border-white/10 items-center justify-around z-50">
  <button>متن</button>
  <button>تصویر</button>
  <button>شکل</button>
  <button>ترجمه</button>
  <button>خروجی</button>
</div><script>

const canvas = new fabric.Canvas('editorCanvas', {
  width: 1080,
  height: 1350,
  backgroundColor: '#111827',
  preserveObjectStacking: true,
  selection: true
});

canvas.setBackgroundColor('#111827', canvas.renderAll.bind(canvas));

// ===== RESPONSIVE CANVAS =====
function fitCanvasToScreen(){

  const container = document.getElementById('canvas-container');

  const designWidth = 1080;
  const designHeight = 1350;

  const availableWidth = window.innerWidth < 768
    ? window.innerWidth * 0.82
    : 620;

  const scale = availableWidth / designWidth;

  canvas.setWidth(designWidth * scale);
  canvas.setHeight(designHeight * scale);

  canvas.setViewportTransform([
    scale,
    0,
    0,
    scale,
    0,
    0
  ]);

  container.style.width = `${designWidth * scale}px`;
  container.style.height = `${designHeight * scale}px`;

  canvas.requestRenderAll();

}

window.addEventListener('resize', fitCanvasToScreen);

// ===== BACKGROUND =====
const bgRect = new fabric.Rect({
  left: 0,
  top: 0,
  width: 1080,
  height: 1350,
  fill: '#0f172a',
  selectable: false,
  evented: false
});

canvas.add(bgRect);
canvas.sendToBack(bgRect);

// ===== GLASS CARD =====
const glassCard = new fabric.Rect({
  left: 80,
  top: 120,
  width: 920,
  height: 1100,
  rx: 40,
  ry: 40,
  fill: 'rgba(255,255,255,0.08)',
  stroke: 'rgba(255,255,255,0.12)',
  strokeWidth: 1,
  selectable: false,
  evented: false
});

canvas.add(glassCard);

// ===== HEADLINE =====
const headline = new fabric.Textbox('مراقبت پزشکی در سطح جهانی', {
  left: 140,
  top: 280,
  width: 780,
  fontSize: 68,
  fill: '#ffffff',
  fontFamily: 'Vazirmatn',
  textAlign: 'center',
  editable: true,
  lineHeight: 1.4,
  fontWeight: '700'
});

canvas.add(headline);
canvas.setActiveObject(headline);

// ===== SUBTITLE =====
const subtitle = new fabric.Textbox('Hair Transplant • Dental • IVF • Cosmetic Surgery', {
  left: 170,
  top: 470,
  width: 740,
  fontSize: 32,
  fill: '#4af6d2',
  fontFamily: 'Inter',
  textAlign: 'center'
});

canvas.add(subtitle);

// ===== CTA =====
const cta = new fabric.Rect({
  left: 340,
  top: 980,
  width: 400,
  height: 96,
  rx: 24,
  ry: 24,
  fill: '#22d3ee',
  shadow: '0 0 30px rgba(34,211,238,0.35)'
});

const ctaText = new fabric.Text('Book Consultation', {
  left: 395,
  top: 1012,
  fill: '#082f49',
  fontSize: 30,
  fontFamily: 'Inter',
  fontWeight: '700'
});

canvas.add(cta);
canvas.add(ctaText);

fitCanvasToScreen();

// ===== LIVE CONTROLS =====
document.getElementById('headline').addEventListener('input', e => {
  headline.text = e.target.value;
  canvas.renderAll();
});

// FONT

document.getElementById('fontFamily').addEventListener('change', e => {
  headline.fontFamily = e.target.value;
  canvas.renderAll();
});

// SIZE

document.getElementById('fontSize').addEventListener('input', e => {
  headline.fontSize = parseInt(e.target.value);
  canvas.renderAll();
});

// COLOR

document.getElementById('textColor').addEventListener('input', e => {
  headline.fill = e.target.value;
  canvas.renderAll();
});

// LANGUAGE

document.getElementById('language').addEventListener('change', e => {

  const lang = e.target.value;

  if(lang === 'fa'){
    headline.fontFamily = 'Vazirmatn';
    headline.textAlign = 'center';
  }

  if(lang === 'ar'){
    headline.fontFamily = 'Cairo';
  }

  if(lang === 'bn'){
    headline.fontFamily = 'Hind Siliguri';
  }

  if(lang === 'en'){
    headline.fontFamily = 'Inter';
  }

  document.getElementById('fontFamily').value = headline.fontFamily;

  canvas.renderAll();

});

// ===== IMAGE UPLOAD =====
document.getElementById('bgUpload').addEventListener('change', function(e){

  const reader = new FileReader();

  reader.onload = function(f){

    fabric.Image.fromURL(f.target.result, function(img){

      canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
        scaleX: canvas.width / img.width,
        scaleY: canvas.height / img.height
      });

    });

  }

  reader.readAsDataURL(e.target.files[0]);

});

// ===== EXPORT =====
function exportPNG(){

  const link = document.createElement('a');
  link.download = 'tebmed-cover.png';
  link.href = canvas.toDataURL({
    format: 'png',
    quality: 1
  });

  link.click();

}

function exportJPG(){

  const link = document.createElement('a');
  link.download = 'tebmed-cover.jpg';
  link.href = canvas.toDataURL({
    format: 'jpeg',
    quality: 1
  });

  link.click();

}

// ===== ZOOM =====
canvas.on('mouse:wheel', function(opt) {

  const delta = opt.e.deltaY;
  let zoom = canvas.getZoom();

  zoom *= 0.999 ** delta;

  if (zoom > 3) zoom = 3;
  if (zoom < 0.5) zoom = 0.5;

  canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);

  opt.e.preventDefault();
  opt.e.stopPropagation();

});

// ===== REAL SIDEBAR ACTIONS =====

function addRectangle(){

  const rect = new fabric.Rect({
    left: 240,
    top: 720,
    width: 240,
    height: 140,
    fill: 'rgba(0,183,209,0.18)',
    rx: 22,
    ry: 22,
    stroke: '#4af6d2',
    strokeWidth: 2
  });

  canvas.add(rect);
  canvas.setActiveObject(rect);
  canvas.renderAll();

}

function addCircle(){

  const circle = new fabric.Circle({
    radius: 80,
    fill: 'rgba(255,255,255,0.12)',
    left: 380,
    top: 760,
    stroke: '#4af6d2',
    strokeWidth: 2
  });

  canvas.add(circle);
  canvas.setActiveObject(circle);
  canvas.renderAll();

}

function applyGlow(){

  const active = canvas.getActiveObject();

  if(active){

    active.set({
      shadow: '0 0 30px rgba(74,246,210,0.7)'
    });

    canvas.renderAll();

  }

}

function translateHeadline(){

  const lang = document.getElementById('language').value;

  if(lang === 'fa'){
    headline.text = document.getElementById('headline').value;
    headline.fontFamily = 'Vazirmatn';
  }

  if(lang === 'en'){
    headline.text = document.getElementById('transEn').value;
    headline.fontFamily = 'Inter';
  }

  if(lang === 'ar'){
    headline.text = document.getElementById('transAr').value;
    headline.fontFamily = 'Cairo';
  }

  if(lang === 'bn'){
    headline.text = document.getElementById('transBn').value;
    headline.fontFamily = 'Hind Siliguri';
  }

  canvas.renderAll();

}

// ===== SIDEBAR INTERACTIONS =====
const tabButtons = document.querySelectorAll('.tab-btn');

tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    tabButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ===== TOOL SIDEBAR =====
const sidebarButtons = document.querySelectorAll('.sidebar-btn');

sidebarButtons.forEach((btn, index) => {

  btn.addEventListener('click', () => {

    sidebarButtons.forEach(b => {
      b.style.background = 'rgba(255,255,255,0.03)';
      b.style.borderColor = 'rgba(255,255,255,0.06)';
    });

    btn.style.background = 'rgba(0,183,209,0.18)';
    btn.style.borderColor = 'rgba(74,246,210,0.3)';

    if(index === 0){
      document.getElementById('headline').focus();
    }

    if(index === 2){
      addCircle();
    }

    if(index === 3){
      translateHeadline();
    }

  }

});

// ===== FIXED MOBILE RESPONSIVE =====
fitCanvasToScreen();

</script></body>
</html>
